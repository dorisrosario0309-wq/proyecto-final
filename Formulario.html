<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="Estilos/Formulario.css">
        <title>Formulario</title>
    </head>
    <body>
        <section class="form-register">
            <h4>Formulario de Registro</h4>
            <input class="control" type="text" name="Nombre" id="Nombre" placeholder="Ingrese su nombre">
            <input class="control" type="control" name="Correo" id="Correo" placeholder="Ingrese su correo">
            <input class="control" type="control" name="Telefono" id="Telefono" placeholder="Ingrese su telefono">
            <p>Estoy de acuerdo con <a href="#">Términos y Condiciones</a></p>
            <input class="boton" type="submit" value="Registrar">
            <p><a href="#">¿Ya tiene usted una cuenta?</a></p>
        </section>
    </body>
</html>
